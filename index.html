    <script>
        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            mobileMenuBtn.classList.toggle('menu-open');
        });
        
        // Close mobile menu when clicking a link
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                mobileMenuBtn.classList.remove('menu-open');
            });
        });
        
        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('bg-dark/95', 'backdrop-blur-lg', 'shadow-lg');
                navbar.classList.remove('bg-transparent');
            } else {
                navbar.classList.remove('bg-dark/95', 'backdrop-blur-lg', 'shadow-lg');
                navbar.classList.add('bg-transparent');
            }
        });
        
        // Smooth scroll function
        function scrollToSection(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        // Intersection Observer for reveal animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    
                    // Trigger counter animation if it's a counter
                    if (entry.target.querySelector('.counter-value')) {
                        animateCounters();
                    }
                }
            });
        }, observerOptions);
        
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        
        // Counter Animation
        let countersAnimated = false;
        function animateCounters() {
            if (countersAnimated) return;
            countersAnimated = true;
            
            const counters = document.querySelectorAll('.counter-value');
            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'));
                const duration = 2000;
                const increment = target / (duration / 16);
                let current = 0;
                
                const updateCounter = () => {
                    current += increment;
                    if (current < target) {
                        counter.textContent = Math.floor(current).toLocaleString();
                        requestAnimationFrame(updateCounter);
                    } else {
                        counter.textContent = target.toLocaleString();
                    }
                };
                
                updateCounter();
            });
        }
        
        // BMI Calculator
        let currentUnit = 'metric';
        
        function setUnit(unit) {
            currentUnit = unit;
            const metricBtn = document.getElementById('unit-metric');
            const imperialBtn = document.getElementById('unit-imperial');
            const heightCm = document.getElementById('height-cm');
            const heightFt = document.getElementById('height-ft');
            const heightIn = document.getElementById('height-in');
            const weightInput = document.getElementById('weight');
            
            if (unit === 'metric') {
                metricBtn.classList.add('bg-neon', 'text-dark');
                metricBtn.classList.remove('bg-gray-800', 'text-gray-400');
                imperialBtn.classList.remove('bg-neon', 'text-dark');
                imperialBtn.classList.add('bg-gray-800', 'text-gray-400');
                
                heightCm.classList.remove('hidden');
                heightFt.classList.add('hidden');
                heightIn.classList.add('hidden');
                weightInput.placeholder = 'kg';
            } else {
                imperialBtn.classList.add('bg-neon', 'text-dark');
                imperialBtn.classList.remove('bg-gray-800', 'text-gray-400');
                metricBtn.classList.remove('bg-neon', 'text-dark');
                metricBtn.classList.add('bg-gray-800', 'text-gray-400');
                
                heightCm.classList.add('hidden');
                heightFt.classList.remove('hidden');
                heightIn.classList.remove('hidden');
                weightInput.placeholder = 'lbs';
            }
        }
        
        function calculateBMI() {
            let height, weight, bmi;
            
            if (currentUnit === 'metric') {
                height = parseFloat(document.getElementById('height-cm').value) / 100;
                weight = parseFloat(document.getElementById('weight').value);
                bmi = weight / (height * height);
            } else {
                const ft = parseFloat(document.getElementById('height-ft').value) || 0;
                const inches = parseFloat(document.getElementById('height-in').value) || 0;
                height = (ft * 12 + inches) * 0.0254;
                weight = parseFloat(document.getElementById('weight').value) * 0.453592;
                bmi = weight / (height * height);
            }
            
            if (!height || !weight || height <= 0 || weight <= 0) {
                alert('Please enter valid height and weight values');
                return;
            }
            
            bmi = Math.round(bmi * 10) / 10;
            
            const resultDiv = document.getElementById('bmi-result');
            const bmiValue = document.getElementById('bmi-value');
            const bmiCategory = document.getElementById('bmi-category');
            const bmiBar = document.getElementById('bmi-bar');
            
            resultDiv.classList.remove('hidden');
            bmiValue.textContent = bmi;
            
            let category, color, width;
            if (bmi < 18.5) {
                category = 'Underweight';
                color = 'bg-green-500';
                width = '15%';
            } else if (bmi < 25) {
                category = 'Normal';
                color = 'bg-neon';
                width = '40%';
            } else if (bmi < 30) {
                category = 'Overweight';
                color = 'bg-yellow-500';
                width = '65%';
            } else {
                category = 'Obese';
                color = 'bg-red-500';
                width = '90%';
            }
            
            bmiCategory.textContent = category;
            bmiCategory.className = `font-oswald text-xl uppercase tracking-wider ${color.replace('bg-', 'text-')}`;
            bmiBar.className = `h-full transition-all duration-1000 ${color}`;
            
            setTimeout(() => {
                bmiBar.style.width = width;
            }, 100);
        }
        
        // Form submission
        function handleSubmit(e) {
            e.preventDefault();
            alert('Thank you for your message! We will contact you shortly.');
            e.target.reset();
        }
        
        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>

    <script>
        // Mobile Menu
        const mobileBtn = document.getElementById('mobile-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        let menuOpen = false;
        
        mobileBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('translate-x-full');
                document.getElementById('m-line-1').style.transform = 'rotate(45deg) translate(5px, 5px)';
                document.getElementById('m-line-2').style.opacity = '0';
                document.getElementById('m-line-3').style.transform = 'rotate(-45deg) translate(5px, -5px)';
                document.getElementById('m-line-3').style.width = '20px';
            } else {
                closeMobile();
            }
        });
        
        function closeMobile() {
            menuOpen = false;
            mobileMenu.classList.add('translate-x-full');
            document.getElementById('m-line-1').style.transform = 'none';
            document.getElementById('m-line-2').style.opacity = '1';
            document.getElementById('m-line-3').style.transform = 'none';
            document.getElementById('m-line-3').style.width = '12px';
        }
        
        // Navbar
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('glass-strong');
            } else {
                navbar.classList.remove('glass-strong');
            }
        });
        
        // Intersection Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    if (entry.target.classList.contains('stagger')) {
                        entry.target.classList.add('visible');
                    }
                }
            });
        }, { threshold: 0.1 });
        
        document.querySelectorAll('.reveal, .stagger').forEach(el => observer.observe(el));
        
        // Progress Tracker Data
        const progressData = {
            days: Array.from({length: 30}, (_, i) => i + 1),
            weight: Array.from({length: 30}, (_, i) => (85 - (i * 0.4)).toFixed(1)),
            bodyFat: Array.from({length: 30}, (_, i) => (22 - (i * 0.35)).toFixed(1)),
            strength: Array.from({length: 30}, (_, i) => Math.floor(100 + (i * 2.5))),
            endurance: Array.from({length: 30}, (_, i) => (5 + (i * 0.15)).toFixed(2))
        };
        
        function updateProgress(day) {
            day = parseInt(day);
            const idx = day - 1;
            
            document.getElementById('day-display').textContent = day.toString().padStart(2, '0');
            document.getElementById('progress-percent').textContent = Math.floor((day / 30) * 100) + '%';
            document.getElementById('checklist-day').textContent = day;
            
            // Update stats
            document.getElementById('weight-stat').textContent = progressData.weight[idx] + ' kg';
            document.getElementById('bf-stat').textContent = progressData.bodyFat[idx] + '%';
            document.getElementById('strength-stat').textContent = progressData.strength[idx] + ' kg';
            document.getElementById('endurance-stat').textContent = progressData.endurance[idx] + ' km';
            
            // Calculate changes from day 1
            const wChange = (progressData.weight[0] - progressData.weight[idx]).toFixed(1);
            const bfChange = (progressData.bodyFat[0] - progressData.bodyFat[idx]).toFixed(1);
            const sChange = progressData.strength[idx] - progressData.strength[0];
            const eChange = (progressData.endurance[idx] - progressData.endurance[0]).toFixed(2);
            
            document.getElementById('weight-change').textContent = wChange > 0 ? `↓ ${wChange} kg` : '--';
            document.getElementById('bf-change').textContent = bfChange > 0 ? `↓ ${bfChange}%` : '--';
            document.getElementById('strength-change').textContent = sChange > 0 ? `↑ +${sChange} kg` : '--';
            document.getElementById('endurance-change').textContent = eChange > 0 ? `↑ +${eChange} km` : '--';
            
            // Update checklist based on day
            updateChecklist(day);
        }
        
        function updateChecklist(day) {
            const container = document.getElementById('checklist-container');
            const items = [
                { name: 'Morning Cardio', sub: 'Treadmill - 300 cal', done: day > 0 },
                { name: 'Protein Intake', sub: `${120 + (day * 2)}g protein consumed`, done: day > 0 },
                { name: 'Strength Training', sub: day % 2 === 0 ? 'Chest & Triceps' : 'Back & Biceps', done: day > 1 },
                { name: 'Hydration Goal', sub: `${3 + (day * 0.05).toFixed(2)} liters`, done: day > 2 },
                { name: 'Sleep (8 hours)', sub: 'Target: 11PM - 7AM', done: day > 3 }
            ];
            
            container.innerHTML = items.map((item, i) => `
                <div class="check-item ${item.done ? 'completed' : ''} flex items-center gap-4 p-4 rounded-xl bg-white/5">
                    <div class="check-circle">
                        <i class="fas fa-check check-icon"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-white font-medium text-sm">${item.name}</p>
                        <p class="text-forge-500 text-xs">${item.sub}</p>
                    </div>
                    <span class="text-xs ${item.done ? 'text-green-400' : 'text-forge-500'} font-medium">${item.done ? 'Done' : 'Pending'}</span>
                </div>
            `).join('');
        }
        
        // Initialize
        updateProgress(1);
        
        // Modal Functions
        function selectPlan(plan) {
            const modal = document.getElementById('trial-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            const selector = document.getElementById('plan-selector');
            if (selector && plan) selector.value = plan;
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 50);
        }
        
        function closeModal() {
            const modal = document.getElementById('trial-modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }
        
        function handleTrial(e) {
            e.preventDefault();
            alert('Welcome to IronForge! Your 7-day free trial starts now. Check your email for details.');
            closeModal();
        }
        
        function handleContact(e) {
            e.preventDefault();
            alert('Message sent! Our team will contact you within 2 hours.');
            e.target.reset();
        }
        
        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    </script>

    <script>
        function load(n) {
            const content = document.getElementById('p' + n).value;
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const ifr = document.getElementById('viewer');
            
            // Revoke old URL if it exists
            if (ifr.dataset.url) URL.revokeObjectURL(ifr.dataset.url);
            
            ifr.src = url;
            ifr.dataset.url = url;
            
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('b' + n).classList.add('active');
        }
        window.onload = () => load(1);
    </script>
